apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: preview
  namespace: argocd
spec:
  project: devhub
  source:
    repoURL: https://github.com/laebernard/GitOps-avec-ArgoCD-.git
    targetRevision: main
    path: platform/apps/preview
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
