# ApplicationSet : annuaire — previews par branche.
#
# C'est l'étape 7. Lisez la doc avant : les generators sont nombreux et
# leur subtilités piègent.
#   Doc : https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/
#
# Deux options possibles :
#   - `git` generator (sur branches) — le plus simple, polling 3 min.
#   - `pullRequest` generator (sur PRs ouvertes) — requiert un token GitHub.
#
# Choisissez et justifiez dans RAPPORT.md.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd

spec:
  goTemplate: true
  generators:
  - git:
      repoURL: https://github.com/laebernard/GitOps-avec-ArgoCD-.git
      revision: HEAD
      branches:
        - preview

  template:
    metadata:
      name: annuaire-preview-{{branchNormalized}}
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire

    spec:
      project: devhub
      source:
        repoURL: https://github.com/laebernard/GitOps-avec-ArgoCD-.git
        targetRevision: '{{branch}}'
        path: services/annuaire/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: annuaire-{{branchNormalized}}.preview.devhub.local

      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{branchNormalized}}

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true