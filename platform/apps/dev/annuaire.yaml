# Application ArgoCD : annuaire-dev
#
# Déploie le chart Helm de services/annuaire/chart dans le namespace devhub-dev.
# Étape 5 (création manuelle) puis étape 6 (générée par la root).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: annuaire-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/laebernard/GitOps-avec-ArgoCD-.git
    targetRevision: feature/PartieIII_GitOps
    path: services/annuaire/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    # Puis basculez en auto avec selfHeal:true / prune:false une fois validé.
    # automated:
    #   prune: false
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
